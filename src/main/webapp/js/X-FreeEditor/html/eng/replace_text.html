<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>찾기/바꾸기</title>
<link rel="stylesheet" href="control.css" type="text/css">
<!--script src="../../config/crossdomain.js" type="text/javascript" language="javascript"></script-->
<script src="../script/tsereplacetext.js" type="text/javascript" language="javascript"></script>
</head>


<body onload="init()">
<!-- 찾기/바꾸기 삽입 시작 -->
<form>
<div class="control_boxline" style="width:280px;">
		<div class="control_boxline_bg">
		 
		 		<!-- 타이틀 -->
				<script language="JavaScript">
				document.write("<div class='control_title' style='background:url(" + getSkinPath('title_bg.gif') + ");'>");
				</script>
					<div class="control_title_name">Search/Replace</div>
				</div>
				<!-- 타이틀 -->
				
				<div class="inside_box1">

					<!-- 레이아웃 테이블 -->
                                        <div class="sp_10px"></div>
					<table border="0" cellspacing="0" cellpadding="0" align="center">
					  <tr>
						<tr>
						<td class="control_Not_Selelct" width="70">Find what:</td>
						<td>
								<!-- 찾아보기 테이블 -->
								<table border="0" cellspacing="0" cellpadding="0">
								  <tr>
									<td><input id="find_text" type="text" class="text_field" style="width:117px;" value=""></td>
									<td>
										<div class="button-box  ui-float-right" id="divMenu" style="width:70px; height:22px;margin-right:5px;" ><span id="btPrint" name="cbBTN" onclick="javascript:FindText();" ><a class="ui-button ui-state-default" onmouseover="this.className='ui-button ui-state-default ui-state-hover'" onmouseout="this.className='ui-button ui-state-default'"><span id="btPrint_Value" class="ui-button-title">Find</span></a></span></div>
										<!--input id="btn_Find" type="button" class="find" onclick="javascript:FindText();" style="width:66px; height:22px;  color:#050; font: bold 100% 'trebuchet ms',helvetica,sans-serif; " value="Find"-->
									</td>
								  </tr>
								</table>
								<!-- 찾아보기 테이블 -->
						</td>
					  </tr>
					   <tr>
						<td class="td_hspace2" colspan="2"></td>
					  </tr>
					  <tr>
						<td class="control_Not_Selelct">Replace with:</td>
						<td>
								<!-- 찾아보기 테이블 -->
								<table border="0" cellspacing="0" cellpadding="0">
								  <tr>
									<td><input id="replace_text" type="text" class="text_field" style="width:116px;" value=""></td>
									<td>
										<div class="button-box  ui-float-right" id="divMenu" style="width:70px; height:22px;margin-right:5px;" ><span id="btPrint" name="cbBTN" onclick="javascript:ReplaceText();" ><a class="ui-button ui-state-default" onmouseover="this.className='ui-button ui-state-default ui-state-hover'" onmouseout="this.className='ui-button ui-state-default'"><span id="btPrint_Value" class="ui-button-title">Replace</span></a></span></div>
										<!--input id="btn_Replace" type="button" class="replace" onclick="javascript:ReplaceText();" style="width:66px; height:22px" value="Replace"-->
									</td>
								  </tr>
								</table>
								<!-- 찾아보기 테이블 -->
						</td>
					  </tr>
					   <tr>
						<td class="td_hspace2" colspan="2"></td>
					  </tr>
					  <tr>
						<td></td>
						<td>
							<div class="button-box  ui-float-right" id="divMenu" style="width:100px; height:22px;margin-right:5px;" ><span id="btPrint" name="cbBTN" onclick="javascript:ReplaceAll();" ><a class="ui-button ui-state-default" onmouseover="this.className='ui-button ui-state-default ui-state-hover'" onmouseout="this.className='ui-button ui-state-default'"><span id="btPrint_Value" class="ui-button-title">ReplaceAll</span></a></span></div>
							<!--input type="button" class="replace" onclick="javascript:ReplaceAll();" style="width:85px; height:22px" value="ReplaceAll"-->
						</td>
					  </tr>
					</table>
					<!-- 레이아웃 테이블 -->
                                        <div class="sp_10px"></div>

				</div>
				
				<div class="inside_box2" >
					<div class="inside_box2_line" >

					<!-- 레이아웃 테이블 -->
                                        <div class="sp_10px"></div>
					<table border="0" cellspacing="0" cellpadding="0" align="center" width="230" class="m_layout">
                      <tr>
                        <td class="control_Not_Selelct">Option</td>
                        <td class="control_Not_Selelct">
						<input id="chk_Upper" type="checkbox" value="">
                        Case sensitive<br>
                        <input id="chk_Return" type="checkbox" value="" checked>
                        Wrap around</td>
                      </tr>
					  </table>
					<!-- 레이아웃 테이블 -->
                    <div class="sp_10px"></div>
					</div>					
				</div>

				<div class="inside_box2" >
					<div class="inside_box2_line" >
					<!-- 레이아웃 테이블 -->
                                        <div class="sp_10px"></div>
					<table border="0" cellspacing="0" cellpadding="0" align="center" width="230" class="m_layout">
                      <tr>
                        <td class="control_Not_Selelct">Direction</td>
                        <td class="control_Not_Selelct"><input id="chk_up" name="chkDir" type="radio" value="" onclick="javascript:setRange();">Up&nbsp;&nbsp;&nbsp;<input id="chk_down" name="chkDir" type="radio" value="" onclick="javascript:setRange();" checked>Down&nbsp;&nbsp;&nbsp;</td>
                      </tr>
					  </table>
					<!-- 레이아웃 테이블 -->
                                        <div class="sp_10px"></div>
					</div>					
				</div>
				
					<!-- 확인버튼 레이아웃 테이블 -->
					<table border="0" cellspacing="0" cellpadding="0" class="button_layout" align="center">
					  <tr>
						<!--td><a href=""><img src="images/btn_ok.gif.gif" alt=""></a></td>
						<td width="10"></td-->
						<td class="control_Not_Selelct"><a href="javascript:onCancel();">
						<script language="JavaScript">
							document.write("<img src='" + getSkinPath('btn_cancel.gif') + "' alt='Cancel'>");
						</script></a></td>
					  </tr>
					</table>
					<!-- 확인버튼 레이아웃 테이블 -->
    </div>
</div>
</form>

<!-- 찾기/바꾸기 끝 -->

</body>

</html>
