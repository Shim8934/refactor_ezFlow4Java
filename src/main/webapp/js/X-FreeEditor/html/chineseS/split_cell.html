<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>기본 콘트롤 박스 레이아웃</title>
<link rel="stylesheet" href="control.css" type="text/css">
<script src="dialog_event.js" type="text/javascript" language="javascript"></script>
<!--script src="../../config/crossdomain.js" type="text/javascript" language="javascript"></script-->
<script src="../script/tsesplitcell.js" type="text/javascript" language="javascript"></script>
</head>


<body>
<!-- 셀정보 삽입 시작 -->
<form>
<div class="control_boxline" style="width:188px;">
		<div class="control_boxline_bg">
		 
		 		<!-- 타이틀 -->
				<script language="JavaScript">
				document.write("<div class='control_title' style='background:url(" + getSkinPath('title_bg.gif') + ");'>");				</script>
					<div class="control_title_name" style="font-family:simsun;">拆分单元格 </div>
				</div>
				<!-- 타이틀 -->
				
				<div class="inside_box1">


					<!-- 레이아웃 테이블 -->
                                        <div class="sp_10px"></div>
					<table class="control_Not_Selelct" border="0" cellspacing="0" cellpadding="0" align="center">
					  <tr>
					    <td width="24"><input type="radio" id="SplitRows" name="SplitCells" value="Rows" checked="" /></td>
					    <td width="50" style="font-family:simsun;">行</td>
						<td>
											<!-- 스핀핸들러 -->
											<table border="0" cellspacing="0" cellpadding="0" height="21"><tr>
												<td rowspan="2" height="21"><input id="Rows" type="text" class="spin_field" style="width:40px" value="2" ></td>
												<td height="11" valign="bottom"><input type=button onClick="javascript:tseSpinUp('Rows');" class="btn_spin_handler_up"></td></tr><tr>
												<td height="10" valign="top"><input type=button onClick="javascript:tseSpinDown('Rows');" class="btn_spin_handler_down"></a></td></tr>
											</table>
											<!-- 스핀핸들러 -->
						</td>
					  </tr>
					   <tr>
						<td class="td_hspace2" colspan="3"></td>
					  </tr>
					   <tr>
						<td class="td_hspace2" colspan="3"></td>
					  </tr>
					   <tr>
						<td class="td_hspace2" colspan="3"></td>
					  </tr>
					  <tr>
					    <td><input type="radio" id="SplitCols" name="SplitCells" value="Cols" /></td>
					    <td style="font-family:simsun;">列</td>
						<td>
											<!-- 스핀핸들러 -->
											<table border="0" cellspacing="0" cellpadding="0" height="21"><tr>
												<td rowspan="2" height="21"><input id="Cols" type="text" class="spin_field" style="width:40px" value="2" ></td>
												<td height="11" valign="bottom"><input type=button onClick="javascript:tseSpinUp('Cols');" class="btn_spin_handler_up"></td></tr><tr>
												<td height="10" valign="top"><input type=button onClick="javascript:tseSpinDown('Cols');" class="btn_spin_handler_down"></a></td></tr>
											</table>
											<!-- 스핀핸들러 -->
						</td>
					  </tr>
					</table>
					<!-- 레이아웃 테이블 -->
                                        <div class="sp_10px"></div>
					
				</div>
				
				<!-- 확인버튼 레이아웃 테이블 -->
		  <table border="0" cellspacing="0" cellpadding="0" class="button_layout" align="center">
					  <tr>
						<td class="control_Not_Selelct"><a href="javascript:xfeSplitCells();">
						<script language="JavaScript">
							document.write("<img src='" + getSkinPath('btn_ok.gif.gif') + "' alt='확인'>");
						</script></a></td>
						<td width="10"></td>
						<td class="control_Not_Selelct"><a href="javascript:onCancel();">
						<script language="JavaScript">
							document.write("<img src='" + getSkinPath('btn_cancel.gif') + "' alt='취소'>");
						</script></a></td>
					  </tr>
		  </table>
					<!-- 확인버튼 레이아웃 테이블 -->
    </div>
</div>
</form>

<!-- 셀삽입 끝 -->
</body>

</html>
