<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>찾기/바꾸기</title>
<link rel="stylesheet" href="control.css" type="text/css">
<script src="dialog_event.js" type="text/javascript" language="javascript"></script>
<!--script src="../../config/crossdomain.js" type="text/javascript" language="javascript"></script-->
<script src="../script/tsesearch.js" type="text/javascript" language="javascript"></script>
</head>


<body onload="init()">
<!-- 찾기/바꾸기 삽입 시작 -->
<form>
<div class="control_boxline" style="width:280px;">
		<div class="control_boxline_bg">
		 
		 		<!-- 타이틀 -->
				<script language="JavaScript">
				document.write("<div class='control_title' style='background:url(" + getSkinPath('title_bg.gif') + ");'>");				</script>
					<div class="control_title_name">搜寻</div>
				</div>
				<!-- 타이틀 -->
				
				<div class="inside_box1">

					<!-- 레이아웃 테이블 -->
                                        <div class="sp_10px"></div>
					<table border="0" cellspacing="0" cellpadding="0" align="center">
					  <tr>
						<tr>
						<td class="control_Not_Selelct" width="60">查找內容&nbsp;&nbsp;</td>
						<td>
								<!-- 찾아보기 테이블 -->
								<table border="0" cellspacing="0" cellpadding="0">
								  <tr>
									<td><input id="find_text" type="text" class="text_field" style="width:117px;" value=""></td>
									<td><input id="btn_Find" type="button" class="find" onclick="javascript:FindText();" alt="찾기"></td>
								  </tr>
								</table>
								<!-- 찾아보기 테이블 -->
						</td>
					  </tr>
					   <tr>
						<td class="td_hspace2" colspan="2"></td>
					  </tr>
					 
				

					</table>
					<!-- 레이아웃 테이블 -->
                                        <div class="sp_10px"></div>

				</div>
				
				<div class="inside_box2" >
					<div class="inside_box2_line" >

					<!-- 레이아웃 테이블 -->
                                        <div class="sp_10px"></div>
					<table border="0" cellspacing="0" cellpadding="0" align="center" width="230" class="m_layout">
                      <tr>
                        <td class="control_Not_Selelct">查找選項</td><td>&nbsp;</td>
                        <td class="control_Not_Selelct">
						<input id="chk_Upper" type="checkbox" value="">
                        區分大小寫<br>
                        <input id="chk_Return" type="checkbox" value="" checked>
                        在語句結尾處反復</td>
                      </tr>
					  </table>
					<!-- 레이아웃 테이블 -->
                    <div class="sp_10px"></div>
					</div>					
				</div>

				<div class="inside_box2" >
					<div class="inside_box2_line" >
					<!-- 레이아웃 테이블 -->
                                        <div class="sp_10px"></div>
					<table border="0" cellspacing="0" cellpadding="0" align="center" width="230" class="m_layout">
                      <tr>
                        <td class="control_Not_Selelct">查找方向</td>
                        <td class="control_Not_Selelct"><input id="chk_up" name="chkDir" type="radio" value="" onclick="javascript:setRange();">向上&nbsp;&nbsp;&nbsp;<input id="chk_down" name="chkDir" type="radio" value="" onclick="javascript:setRange();" checked>向下&nbsp;&nbsp;&nbsp;</td>
                      </tr>
					  </table>
					<!-- 레이아웃 테이블 -->
                                        <div class="sp_10px"></div>
					</div>					
				</div>
				
					<!-- 확인버튼 레이아웃 테이블 -->
					<table border="0" cellspacing="0" cellpadding="0" class="button_layout" align="center">
					  <tr>
						
						<td class="control_Not_Selelct"><a href="javascript:onCancel();">
						<script language="JavaScript">
							document.write("<img src='" + getSkinPath('btn_cancel.gif') + "' alt='取消'>");
						</script></a></td>
					  </tr>
					</table>
					<!-- 확인버튼 레이아웃 테이블 -->
    </div>
</div>
</form>

<!-- 찾기/바꾸기 끝 -->

</body>

</html>
