<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>기본 콘트롤 박스 레이아웃</title>
<link rel="stylesheet" href="control.css" type="text/css">
<!--script src="../../config/crossdomain.js" type="text/javascript" language="javascript"></script-->
<script src="dialog_event.js" type="text/javascript" language="javascript"></script>
<script src="../script/tseeditlink.js" type="text/javascript" language="javascript"></script>
</head>
<body>
<!-- 링크삽입 시작 -->
<form>
<div class="control_boxline" style="width:310px;">
		<div class="control_boxline_bg">
		 
		 		<!-- 타이틀 -->
				<script language="JavaScript">
				document.write("<div class='control_title' style='background:url(" + getSkinPath('title_bg.gif') + ");'>");				</script>
					<div class="control_title_name">링크 삽입</div>
				</div>
				<!-- 타이틀 -->
				
				<div class="inside_box1">

					<!-- 레이아웃 테이블 -->
                                        <div class="sp_10px"></div>
					<table width="283" border="0" cellspacing="0" cellpadding="0" align="center">
					  <tr>
						<td class="control_Not_Selelct" width="72">주소(URL) </td>
						<td><input id="url" type="text" class="text_field" style="width:210px" value="" ></td>
					  </tr>
					</table>
					<!-- 레이아웃 테이블 -->
                                        <div class="sp_10px"></div>

				</div>
				
				<div class="inside_box2" >
					<div class="inside_box2_line" >

					<!-- 레이아웃 테이블 -->
                                        <div class="sp_10px"></div>
					<table width="283" border="0" cellspacing="0" cellpadding="0" align="center">
					  <tr>
						<td class="control_Not_Selelct" width="72">대상(target)</td>
						<td>
						<select id="target" class="combobox">
						  <option value="_blank">_blank</option>
						  <option value="_parent">_parent</option>
						  <option value="_self">_self</option>
						  <option value="_top">_top</option>
						</select>
						</td>
					  </tr>
					   <tr>
						<td class="td_hspace2"></td>
					  </tr>
					  <tr>
						<td class="control_Not_Selelct">문구</td>
						<td><input id="alt" type="text" class="link_text_field" style="width:210px" value="" disabled="true" style="background: #dcdcdc;"></td>
					  </tr>
					</table>
					<!-- 레이아웃 테이블 -->
                                        <div class="sp_10px"></div>
					
					</div>					
				</div>
				
					<!-- 확인버튼 레이아웃 테이블 -->
					<table border="0" cellspacing="0" cellpadding="0" class="button_layout" align="center">
					  <tr>
						<td class="control_Not_Selelct"><a href="javascript:tseInsertHTML();">
						<script language="JavaScript">
							document.write("<img src='" + getSkinPath('btn_ok.gif.gif') + "' alt='확인'>");
						</script></a></td>
						<td width="10"></td>
						<td class="control_Not_Selelct"><a href="javascript:onCancel();">
						<script language="JavaScript">
							document.write("<img src='" + getSkinPath('btn_cancel.gif') + "' alt='취소'>");
						</script></a></td>
					  </tr>
					</table>
					<!-- 확인버튼 레이아웃 테이블 -->
    </div>
</div>

<!-- 링크삽입 끝 -->

</body>

</form>
</html>
