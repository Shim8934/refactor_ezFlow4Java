<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>붙여넣기</title>
<link rel="stylesheet" href="control.css" type="text/css">
<!--script src="../../config/crossdomain.js" type="text/javascript" language="javascript"></script-->
<script src="dialog_event.js" type="text/javascript" language="javascript"></script>
<script src="../script/tsepaste.js" type="text/javascript" language="javascript"></script>
</head>


<body>
<!-- 에디터에 대하여 시작 -->
<form>
<div class="control_boxline" style="width:410px;">
		<div class="control_boxline_bg">
		 
		 		<!-- 타이틀 -->
				<script language="JavaScript">
				document.write("<div class='control_title' style='background:url(" + getSkinPath('title_bg.gif') + ");'>");				</script>
					<div class="control_title_name">붙여넣기</div>
				</div>
				<div class="inside_box1">

					<!-- 레이아웃 테이블 -->
                                        <div class="sp_10px"></div>
					                    <table width="390" border="0" align="center" cellpadding="0" cellspacing="0">
                                          <tr>
                                            <td class="control_Not_Selelct" width="100" align="center" valign="middle" >
											<script language="JavaScript">
												document.write("<img src='" + getSkinPath('m_img.gif') + "' alt='취소'>");
											</script></td>
                                            <td class="control_Not_Selelct" width="280" class="paste_text">
											브라우저 보안 설정으로, 클립보드의 자료를 직접 <br />
											접근할 수 없습니다.<br />
                                            <span style="color:#FF0000;">키보드 명령(Ctrl+V)</span>를 이용해서 밑의 입력박스 안에 붙여넣기 한 후 확인을 클릭해 주세요. </td>
                                          </tr>
                                        </table>                    
					                    <!-- 레이아웃 테이블 -->
				<div class="sp_10px"></div>

				</div>
				
				<div class="inside_box2" >
					<div class="inside_box2_line" align="center">

					<!-- 붙여넣기 입력상자 -->
                                        <div class="sp_10px"></div>
					                    <iframe name="paste_html" id="paste_html" class="paste_input" frameborder="0"></iframe>
                                        <div class="sp_10px"></div>
					<!-- 붙여넣기 입력상자 -->
					</div>					
				</div>
				
					<!-- 확인버튼 레이아웃 테이블 -->
					<table border="0" cellspacing="0" cellpadding="0" class="button_layout" align="center">
					  <tr>
						<td class="control_Not_Selelct"><a href="javascript:onPaste();">
						<script language="JavaScript">
							document.write("<img src='" + getSkinPath('btn_ok.gif.gif') + "' alt='확인'>");
						</script></a></td>
						<td width="10"></td>
						<td class="control_Not_Selelct"><a href="javascript:onCancel();">
						<script language="JavaScript">
							document.write("<img src='" + getSkinPath('btn_cancel.gif') + "' alt='취소'>");
						</script></a></td>
					  </tr>
					</table>
					<!-- 확인버튼 레이아웃 테이블 -->
    </div>
</div>


</form>

<!-- 에디터에 대하여 끝 -->
</body>

</html>
