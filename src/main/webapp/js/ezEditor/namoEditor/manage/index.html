	var ce$ = namo$.noConflict(true);
	function addEvent(elm, pe_ml, fn) {
		if (elm.addEventListener) {
			elm.addEventListener(pe_ml, fn, false);
		} else if (elm.attachEvent) {
			elm.attachEvent('on' + pe_ml, fn);
		} else {
			elm['on' + pe_ml] = fn;
		}
	}
	function pe_ao(){
		var pe_ave = document.getElementById("pe_ave");

		});

		var pe_bvd = document.getElementById("pe_aIh");
		addEvent(pe_bvd, 'click', function(e){
			login.pe_aIj.click();
		});
	}

</script>
