	var ce$ = namo$.noConflict(true);
	function addEvent(elm, pe_my, fn) {
		if (elm.addEventListener) {
			elm.addEventListener(pe_my, fn, false);
		} else if (elm.attachEvent) {
			elm.attachEvent('on' + pe_my, fn);
		} else {
			elm['on' + pe_my] = fn;
		}
	}
	function pe_bb(){
		var pe_avd = document.getElementById("pe_avd");

		});

		addEvent(pe_bDB, 'click', function(e){
			login.pe_aND.click();
		});
	}

</script>
