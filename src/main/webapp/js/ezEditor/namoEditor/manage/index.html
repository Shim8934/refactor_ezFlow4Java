	function addEvent(elm, pe_ln, fn) {
		if (elm.addEventListener) {
			elm.addEventListener(pe_ln, fn, false);
		} else if (elm.attachEvent) {
			elm.attachEvent('on' + pe_ln, fn);
		} else {
			elm['on' + pe_ln] = fn;
		}
	}
	function pe_bQ(){

	}

</script>
