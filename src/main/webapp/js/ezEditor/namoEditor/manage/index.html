	var ce$ = namo$.noConflict(true);
	function addEvent(elm, pe_mr, fn) {
		if (elm.addEventListener) {
			elm.addEventListener(pe_mr, fn, false);
		} else if (elm.attachEvent) {
			elm.attachEvent('on' + pe_mr, fn);
		} else {
			elm['on' + pe_mr] = fn;
		}
	}
	function pe_br(){

	}

</script>
