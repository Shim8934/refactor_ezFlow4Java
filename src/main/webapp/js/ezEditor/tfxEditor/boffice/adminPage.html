    <script type="text/javascript">
	
	$(document).ready(function(){		
		
		var strBasePath = location.href;
		strBasePath = strBasePath.replace("/boffice/adminPage.html", "");
		
		var xfedit = new XFE({
			//basePath : location.protocol + "//" + document.domain + ":" + location.port + "/xfe4_page2/source_rebuild",
			basePath : strBasePath,
			width : '100%',
			height : '500px',
			onLoad : initLoad
		});
		xfedit.render('ex_div');
		
		function initLoad(){
			
		}
		
		// 파라미터 초기화
		var optionObj = {
			serverType : "php",
			xfeEnv : "/xfe3_new2/source_rebuild/config/env.xml"
		};
		
		// XFE opener 연동
		if(window.opener){
		
			var srvrType = parent.svrlang;
			
			if(typeof(srvrType) == "undefined"){
			
				srvrType = xfedit.xfeStackObject.xfeInitServerSideLang;
			}
			
			var envUrl = parent.envUrl;
			
			if(typeof(envUrl) == "undefined"){
			
				envUrl = xfedit.xfeStackObject.xfeBasePath;
			}
			envUrl += "/config/env.xml";         
			envUrl = envUrl.replace(location.protocol + "//" + location.host, "");
			
			optionObj["serverType"] = srvrType;
			optionObj["xfeEnv"] = envUrl;
			
			// 버전정보 표시 -> 주석처리
			/*
			var xfeVersion = opener.xfedit.getVersion();
			var xfeCompany = opener.xfedit.xfeStackObject.xfeUserCompany;
			var xfeUserLicense = opener.xfedit.xfeStackObject.xfeUserLicense;
			var strInfo = "";
			strInfo += "<b>";
			strInfo += "<div>" + xfeCompany + "</div>";
			strInfo += "<div>" + xfeUserLicense + "</div>";
			strInfo += "<div style='padding-top: 5px;'>" + xfeVersion + "</div>";
			strInfo += "</b>";
			*/
			//document.getElementById("info").innerHTML = strInfo;         
		} else {
			
			alert("이 페이지를 볼 권한이 없습니다.");
			/*
			 * 관리자페이지는 X-Free Editor 통해서 접근하여 사용하도록 권장하려 하기에 직접적인 url 접근은 기본적으로 막아놓았습니다.
			 * 만약에 직접적인 url 접근을 허용한다면 아래 return false; 를 주석처리 하시면 됩니다.
			*/
			$("body").hide();
			return false;
			
			optionObj["serverType"] = xfedit.xfeStackObject.xfeInitServerSideLang;
			
			var envUrl = xfedit.xfeStackObject.xfeBasePath;			
			envUrl += "/config/env.xml";         
			envUrl = envUrl.replace(location.protocol + "//" + location.host, "");
			optionObj["xfeEnv"] = envUrl;
		}

		
		// 관리자페이지 옵션정보
		userSettingObj = {
			// 서버 타입(jsp/php/aspx)
			//serverType : "jsp",
			//serverType : "php",
			//serverType : "aspx",
			serverType : optionObj["serverType"],
			
			// 불러오기경로
			readUrl : location.protocol + "//"+document.domain+":"+location.port,
			
			// 저장경로
			//writeUrl : "/adminPage",
			writeUrl : "",
			
			// XML파일 READ경로
			loadXml : {
				//xfeEnv : "/export_XFE/source_rebuild/config/env.xml",
				xfeEnv : optionObj["xfeEnv"],
				ad : "/adminPage/config/env_ad.xml",
				xfuConfig : "/xfu1/config/config.xml",
				xfuLanguage : "/xfu1/config/"
			},
			// XML파일 SAVE경로
			saveXml : {
				//xfeEnv : "/export_XFE/source_rebuild/config/env.xml",
				xfeEnv : optionObj["xfeEnv"],
				ad : "/adminPage/_config/env_ad.xml",
				xfuConfig : "/xfu1/config/config.xml",
				xfuLanguage : "/xfu1/config/"
			},
			// 타이틀 정보(타이틀명 / 너비합계는 무조건 100%가 되어야 합니다.)
			title : [
				{label : "옵션명", width:"26%"},
				{label : "옵션 적용 여부", width:"12%"},
				{label : "옵션 내용", width:"32%"},
				{label : "기본 설명", width:"30%"}
			],
			title2 : [
				{label : "KeyName", width:"20%"},
				{label : "ko", width:"16%"},
				{label : "cn_s", width:"16%"},
				{label : "cn_t", width:"16%"},
				{label : "en", width:"16%"},
				{label : "jp", width:"16%"}
			]
		};
		
		// 타이틀 정보 세팅
		_createTitleCol();
		
		// 컬럼 유효성 체크(너비가 안맞더라도 동작은 가능하게 허용)
		if(!_isColSumValid()) {
		
			alert("[경고]\ncolumn의 너비가 맞지 않습니다.\n화면너비 조절이 잘못되어 보일 수 있습니다.\ncolumn 정보를 재확인 바랍니다.");
		}
		
		// 컬러 팝업창 세팅
		//xfuColor = $.farbtastic('#picker').linkTo('#color');
		$("#perspective").hide();
		
		// 주석 내용 불러오기
		_reMarkMsg();
		
		// 이벤트 핸들러 세팅
		_setEvtHandler();
		
		var areaHeight = $(window).height() - 100;
		$("#emptyArea").show().css({
			"height" : areaHeight,
			"line-height" : areaHeight/1+00+"px"
		});

		

		// X-Free Uploader, X-Free Uploader Language 숨기고, xfe 너비 값 100% 주기
		// ayoung
		
		$('li#xfe').hide();
		$('li#xfu').hide();
		$('li#xfu-l').hide();
		
		if($('li#xfu').css('display') == 'none' || $('li#xfu-l').css('display') == 'none') {
		
			$('li#xfe').css('width','100%');
		}

		// 페이지 바로 열기
		setTimeout(function(){
		
			$(".optSelection-pnl").find("li:nth-child(1)").click();
			
		},100);		
		
		
		// 하단 copyright 최신연도로 자동 업데이트
		var date = new Date();
		var year = date.getFullYear();
		$("#currentYear").html(year);
	});
    </script>

				</div>
			</div>
		</div>
		<div class="optSelection-pnl">
			<ul>
				<li value="xfeEnv" id="xfe">X-Free Editor</li>
				<li value="xfuConfig" id="xfu">X-Free Uploader</li>

			</ul>

	</header>
	<main>
		<div id="container">

			<div id="noticebox">
				<div id="noticeMsg">
					<span><img src="./images/notice.png" alt=""></span>
					<span>변경한 내용이 적용되지 않을 경우, 페이지를 새로고침 [Ctrl + F5] 하거나 캐시를 삭제해 보시기 바랍니다.</span>

			</div>
			
			<div class="header-pnl">
				<table width="100%">

						<col width="25%" id="col1Width">
						<col width="10%" id="col2Width">
						<col width="35%" id="col3Width">

							<label for="color">Color : </label>
