<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <meta charset="UTF-8"/>
    <meta name="format-detection" content="telephone=no"/>
    <meta http-equiv="X-UA-Compatible" content="IE=Edge"/>
    <title>Kukudocs Editor</title>

    <script type="text/javascript" src="./externalLib/jquery-1.9.1.min.js"></script>
    <script type="text/javascript" src="./externalLib/jquery-ui-1.11.4.min.js"></script>

    <script type="text/javascript" src="./javascripts/build/Editor.bundle.js"></script>

    <link rel="stylesheet" href="./stylesheets/style.css">

    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }
    </style>
    <script type="text/javascript">

        function Editor_Complete() {
            console.log("Editor Load Complete !!!");
        }

        function Key_event() {
            console.log("Key_event Call !!!");
        }

        function Mouse_event() {
            console.log("Mouse_event Call !!!");
        }

        $(document).ready(function(){
            window.kukuEditor = new KuKudocsEditor('editor', {
                minHeight : 0,
                maxHeight : 0,
                width : '100%',
                height : '100%',
                fileUploadURL : '/fileUpload',
                useMenuBar : true,
                templateList : [
                    {
                        name : '부서양식',
                        items : [
                            { name : '회의록', type : 'url', value : './template/meeting_log.html' },
                            { name : '보고서', type : 'url', value : './template/report.html' }
                        ]
                    },
                    {
                        name : '인사',
                        items : [
                            { name : '휴가신청서', type : 'url', value : './template/vacation.html' },
                            { name : 'Sample', type : 'html', value : '<p><span>test sample</span></p>' }
                        ]
                    }
                ],
                Editor_Complete : Editor_Complete
            });
        });
    </script>
</head>
<body>
<textarea id="editor"><p><span class="">&nbsp;</span></p></textarea>
</body>
</html>
